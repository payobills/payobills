{{- if and .Values.supergraphHook .Values.supergraphHook.enabled }}
{{- $hookName := printf "%s-supergraph-compose" .Release.Name }}
{{- $configMapName := default "supergraph-config" .Values.supergraphHook.configMapName }}
{{- $namespace := default .Release.Namespace .Values.supergraphHook.namespace }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $hookName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $hookName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: [{{ $configMapName | quote }}]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $hookName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $hookName }}
subjects:
  - kind: ServiceAccount
    name: {{ $hookName }}
    namespace: {{ $namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $hookName }}-rover-config
  namespace: {{ $namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
data:
  rover.yaml: |
    {{- .Values.supergraphHook.roverConfig | nindent 4 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $hookName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: hook-succeeded,before-hook-creation
spec:
  completions: 1
  parallelism: 1
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "app.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ $hookName }}
      volumes:
        - name: rover-config
          configMap:
            name: {{ $hookName }}-rover-config
      containers:
        - name: compose-supergraph
          image: node:22-alpine
          volumeMounts:
            - name: rover-config
              mountPath: /config
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e

              echo "Installing kubectl..."
              apk add --no-cache curl
              KUBECTL_VERSION=$(curl -Ls https://dl.k8s.io/release/stable.txt)
              curl -fsSLo /usr/local/bin/kubectl \
                "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/arm64/kubectl"
              chmod +x /usr/local/bin/kubectl

              echo "Running supergraph composition..."
              npx --yes @apollo/rover supergraph compose \
                --config /config/rover.yaml \
                --output /tmp/supergraph.gql

              echo "Building patch payload..."
              node -e "
                const fs = require('fs');
                const schema = fs.readFileSync('/tmp/supergraph.gql', 'utf8');
                const patch = {
                  data: {
                    graphqlSchema: schema,
                    lastComposedAt: new Date().toISOString()
                  }
                };
                fs.writeFileSync('/tmp/patch.json', JSON.stringify(patch));
              "

              echo "Patching ConfigMap {{ $configMapName }}..."
              kubectl patch configmap {{ $configMapName }} \
                -n {{ $namespace }} \
                --type merge \
                --patch-file /tmp/patch.json

              echo "Done."
{{- end }}
